    <title>Natick 2026 马年春晚 | Natick CNY 2026</title>
    
    <!-- ERROR TRAP: Displays errors on mobile if JS fails to load -->
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var container = document.getElementById('global-error-display');
        if (!container) {
          container = document.createElement('div');
          container.id = 'global-error-display';
          container.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:#8a1c26;color:white;z-index:99999;padding:20px;font-family:monospace;overflow:auto;display:flex;flex-direction:column;justify-content:center;';
          document.body.appendChild(container);
        }
        var message = [
          '⚠️ System Error',
          'Message: ' + msg,
          'URL: ' + url,
          'Line: ' + lineNo + ', Column: ' + columnNo,
          'Stack: ' + (error && error.stack ? error.stack : 'N/A')
        ].join('\n');
        
        container.innerText = message;
        
        // Add reload button
        var btn = document.createElement('button');
        btn.innerText = 'RELOAD PAGE';
        btn.style.cssText = 'margin-top:20px;padding:15px;background:white;color:black;border:none;border-radius:8px;font-weight:bold;';
        btn.onclick = function() { window.location.reload(); };
        container.appendChild(btn);

        return false;
      };

      // Catch Promise rejections (e.g. Import Map failures)
      window.onunhandledrejection = function(event) {
        window.onerror('Unhandled Rejection: ' + event.reason, '', '', '', event.reason);
      };
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Inter"', '"SF Pro Display"', '"PingFang SC"', '"Microsoft YaHei"', 'system-ui', 'sans-serif'],
              serif: ['"STKaiti"', '"KaiTi"', '"Source Han Serif CN"', 'serif'],

            colors: {
              cny: {
                red: '#D72638',
                gold: '#FCE7BB',

                bg: '#0F0F0F',

                cloud: '#F9F1E7'
              }
            },
            backgroundImage: {
              'silk-gradient': "linear-gradient(135deg, #8a1c26 0%, #D72638 100%)",
              'glass-shine': "linear-gradient(45deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%)",
            }

      }

    <style>
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #8a1c26;
        background-image: radial-gradient(circle at top right, #D72638, transparent),
                          radial-gradient(circle at bottom left, #4a0d13, transparent);
        background-attachment: fixed;
        /* Prevent bounce scroll on iOS */
        overscroll-behavior-y: none;
      }
      
      /* Simple Loading Spinner for initial load */
      #app-loader {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #FCE7BB;
        font-family: serif;
        font-size: 24px;
        font-weight: bold;
        z-index: 0;
        animation: pulse 2s infinite;
      }
      @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

      @keyframes float {
        0% { transform: translate3d(0, 0, 0); }
        50% { transform: translate3d(0, -10px, 0); }
        100% { transform: translate3d(0, 0, 0); }
      }
      .festive-float { 
        animation: float 4s ease-in-out infinite; 
        will-change: transform;
      }
      
      .glass-card {
        background: rgba(255, 255, 255, 0.88);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(252, 231, 187, 0.4);
      }
      
      .glass-dark {
        background: rgba(60, 10, 15, 0.6);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 252, 231, 0.15);
      }

      @keyframes burst {
        0% { transform: scale(0.8); opacity: 0; }
        50% { transform: scale(1.05); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
      }
      .animate-burst { animation: burst 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

      .confetti {
        position: absolute;
        width: 10px;
        height: 10px;
        background-color: #FCE7BB;
        opacity: 0;
      }
      @keyframes confetti-fall {
        0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
        100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
      }

      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #D72638; border-radius: 10px; }
    </style>
