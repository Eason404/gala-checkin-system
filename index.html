
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Natick 2026 马年春晚 | Natick CNY 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"PingFang SC"', '"Microsoft YaHei"', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
              serif: ['"STKaiti"', '"KaiTi"', 'serif'],
            },
            colors: {
              cny: {
                red: '#D72638',
                gold: '#FCE7BB',
                dark: '#8a1c26',
                bg: '#0F0F0F',
                accent: '#FCE7BB',
                cloud: '#F9F1E7'
              }
            },
            backgroundImage: {
              'silk-gradient': "linear-gradient(135deg, #8a1c26 0%, #D72638 100%)",
              'glass-shine': "linear-gradient(45deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%)",
            }
          }
        }
      }
    </script>
    <style>
      @keyframes float {
        0% { transform: translate3d(0, 0, 0); }
        50% { transform: translate3d(0, -10px, 0); }
        100% { transform: translate3d(0, 0, 0); }
      }
      .festive-float { 
        animation: float 4s ease-in-out infinite; 
        will-change: transform;
      }
      
      /* Glassmorphism Utilities */
      .glass-card {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(252, 231, 187, 0.3);
      }
      
      .glass-dark {
        background: rgba(138, 28, 38, 0.4);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      /* Red Envelope Success Animations */
      @keyframes flap-open {
        from { transform: rotateX(0deg); }
        to { transform: rotateX(-180deg); z-index: 0; }
      }
      @keyframes slide-out {
        from { transform: translateY(0); opacity: 0; }
        to { transform: translateY(-50%); opacity: 1; }
      }
      @keyframes burst {
        0% { transform: scale(0.8); opacity: 0; }
        50% { transform: scale(1.1); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
      }
      .animate-flap { animation: flap-open 0.6s ease-in forwards; }
      .animate-ticket-slide { animation: slide-out 0.8s 0.6s ease-out forwards; }
      .animate-burst { animation: burst 0.5s ease-out forwards; }

      /* Confetti */
      .confetti {
        position: absolute;
        width: 10px;
        height: 10px;
        background-color: #FCE7BB;
        opacity: 0;
      }
      @keyframes confetti-fall {
        0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
        100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
      }

      /* Custom scrollbar for better look */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #D72638; border-radius: 10px; }
      
      body {
        background-color: #8a1c26;
        background-image: radial-gradient(circle at top right, #D72638, transparent),
                          radial-gradient(circle at bottom left, #4a0d13, transparent);
        background-attachment: fixed;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.6",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "recharts": "https://aistudiocdn.com/recharts@^3.5.0",
    "qrcode": "https://esm.sh/qrcode@1.5.3",
    "html5-qrcode": "https://esm.sh/html5-qrcode@2.3.8",
    "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
    "firebase/analytics": "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
    "firebase/": "https://esm.sh/firebase@^12.7.0/"
  }
}
</script>
</head>
  <body class="text-gray-800 font-sans selection:bg-cny-gold selection:text-cny-dark overflow-x-hidden">
    <div id="root"></div>
  </body>
</html>
