
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Natick 2026 马年春晚</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"PingFang SC"', '"Microsoft YaHei"', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
              serif: ['"STKaiti"', '"KaiTi"', 'serif'],
            },
            colors: {
              cny: {
                red: '#D72638',
                gold: '#FFD700',
                dark: '#8a1c26',
                bg: '#FFFDF5', // Softer paper white
                accent: '#FCE7BB',
                cloud: '#F9F1E7'
              }
            },
            backgroundImage: {
              'cloud-pattern': "url('https://www.transparenttextures.com/patterns/natural-paper.png')",
            }
          }
        }
      }
    </script>
    <style>
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-5px); }
        100% { transform: translateY(0px); }
      }
      .festive-float { animation: float 3s ease-in-out infinite; }
      .traditional-border {
        border: 2px solid #FFD700;
        position: relative;
        padding: 1rem;
      }
      .traditional-border::before, .traditional-border::after {
        content: "🏮";
        position: absolute;
        font-size: 0.8rem;
      }
      .traditional-border::before { top: -10px; left: -10px; }
      .traditional-border::after { bottom: -10px; right: -10px; }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.6",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "recharts": "https://aistudiocdn.com/recharts@^3.5.0",
    "qrcode": "https://esm.sh/qrcode@1.5.3",
    "html5-qrcode": "https://esm.sh/html5-qrcode@2.3.8",
    "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
    "firebase/analytics": "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
    "firebase/": "https://esm.sh/firebase@^12.7.0/"
  }
}
</script>
</head>
  <body class="bg-cny-bg text-gray-800 font-sans bg-cloud-pattern">
    <div id="root"></div>
  </body>
</html>
