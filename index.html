  <!-- ERROR TRAP: Displays errors on mobile if JS fails to load -->
  <script>
    window.onerror = function (msg, url, lineNo, columnNo, error) {
      var container = document.getElementById('global-error-display');
      if (!container) {
        container = document.createElement('div');
        container.id = 'global-error-display';
        container.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:#8a1c26;color:white;z-index:99999;padding:20px;font-family:monospace;overflow:auto;display:flex;flex-direction:column;justify-content:center;';
        document.body.appendChild(container);
      }
      var message = [
        '⚠️ System Error',
        'Message: ' + msg,
        'URL: ' + url,
        'Line: ' + lineNo + ', Column: ' + columnNo,
        'Stack: ' + (error && error.stack ? error.stack : 'N/A')
      ].join('\n');

      container.innerText = message;

      // Add reload button
      var btn = document.createElement('button');
      btn.innerText = 'RELOAD PAGE';
      btn.style.cssText = 'margin-top:20px;padding:15px;background:white;color:black;border:none;border-radius:8px;font-weight:bold;';
      btn.onclick = function () { window.location.reload(); };
      container.appendChild(btn);

      return false;
    };

    // Catch Promise rejections (e.g. Import Map failures)
    window.onunhandledrejection = function (event) {
      window.onerror('Unhandled Rejection: ' + event.reason, '', '', '', event.reason);
    };
  </script>
